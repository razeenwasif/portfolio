    <!-- Fonts load from HTML (not a CSS @import) so the request starts

         weights actually used: Fraunces 300/400/500, Inter 400/500,
         JetBrains Mono 400/500. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />

      name="description"
      content="Razeen Wasif — Software Engineer & ML Researcher. GPU systems, neuro-symbolic ML, and full-stack product."
    />
    <title>Razeen Wasif — Software Engineer & ML Researcher</title>
  </head>
